name: "ManoirQuest"
description: "Application de gamification des tâches ménagères pour la famille"
version: "0.2.1"
slug: "manoirquest"
init: false
homeassistant_api: false
hassio_api: false
hassio_role: default
auth_api: false
ingress: true
ingress_port: 3000
ingress_stream: false
panel_icon: "mdi:broom"
panel_title: "ManoirQuest"
panel_admin: false

ports:
  3000/tcp: null

map:
  - share:rw

options:
  data_path: /share/manoirquest
  port: 3000
  secret_key: "change-me-in-production-32-chars-min"

schema:
  data_path: str
  port: int
  secret_key: str

arch:
  - aarch64
  - amd64
  - armv7

startup: application
boot: auto
