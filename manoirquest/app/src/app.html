<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#1c1c1e" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="ManoirQuest" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
		<link rel="icon" href="%sveltekit.assets%/icons/favicon.png" />
		<!-- Fond d'écran auto-hébergé (static/background.jpg). On passe par
		     %sveltekit.assets% — le même mécanisme que les icônes — pour rester
		     correct sous l'ingress HAOS. Exposé en variable CSS pour app.css. -->
		<style>:root{--app-bg:url('%sveltekit.assets%/background.jpg')}</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-reload class="bg-gray-50">
		<div id="svelte">%sveltekit.body%</div>
		<script>
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', () => {
					navigator.serviceWorker.register('%sveltekit.assets%/sw.js');
				});
			}
		</script>
	</body>
</html>
